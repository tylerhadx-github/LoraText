<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoraText - Off-grid encrypted messaging</title>

    <meta name="description"
        content="LoraText - off-grid, encrypted group messaging. Pair a custom LoRa radio over Web Bluetooth and text anywhere, even with no cell signal." />
    <meta name="theme-color" content="#0b0b10" />
    <link rel="icon" href="/img/brand-logo.png" />
    <link rel="apple-touch-icon" href="/img/brand-logo.png" />
    <link rel="mask-icon" href="/mask-icon.svg" color="#7c5cff">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://js.arcgis.com/4.26/esri/css/main.css">

    <style>
        html {
            scroll-behavior: smooth;
        }

        html,
        body,
        #app {
            margin: 0;
            background-color: #0b0b10;
            color: #f4f4f8;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        section[id] {
            scroll-margin-top: 80px;
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
